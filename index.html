                        </div>
                    </div>

                    {view === 'list' ? (
                        <div className="animate-in fade-in duration-500">

                                    <input 
                                        type="text"
                                        placeholder="サークルやイベントを検索"
                                        className="w-full bg-gray-100 rounded-xl py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-red-800/20"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                    {['すべて', 'スポーツ', '文化', '音楽', 'ボランティア'].map(g => (
                                        <button
                                            key={g}
                                            onClick={() => setFilterGenre(g)}
                                            className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border transition-all ${filterGenre === g ? 'bg-red-800 border-red-800 text-white shadow-md' : 'bg-white border-gray-200 text-gray-500'}`}
                                        >
                                            {g}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* リスト表示 */}
                            <div className="p-4 space-y-4 pb-24">
                                {filteredEvents.map(event => (
                                    <div 
                                        key={event.id} 
                                        className="bg-white rounded-[24px] border border-gray-100 overflow-hidden shadow-sm active-scale transition-transform"
                                        onClick={() => { setSelectedEvent(event); setView('detail'); }}
                                    >
                                        <div className="h-32 bg-gradient-to-br from-red-50 to-red-100 flex items-center justify-center">
                                            <span className="text-red-800/10 font-black text-5xl">{event.circleName[0]}</span>
                                        </div>
                                        <div className="p-4">
                                            <div className="flex justify-between items-start mb-1">
                                                <p className="text-[10px] font-bold text-red-800">{event.circleName}</p>
                                                <span className="text-[10px] text-gray-400 font-bold">{event.genre}</span>
                                            </div>
                                            <h3 className="text-lg font-black text-gray-800 leading-tight mb-2">{event.eventName}</h3>
                                            <div className="flex gap-3 text-[10px] text-gray-500 font-bold">
                                                <div className="flex items-center gap-1"><i data-lucide="calendar" size="12"></i>{event.date}</div>
                                                <div className="flex items-center gap-1"><i data-lucide="map-pin" size="12"></i>{event.place}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                                <span className="text-white/10 font-black text-[120px]">{selectedEvent.circleName[0]}</span>
                            </div>

                                <h2 className="text-2xl font-black text-gray-800 mb-1">{selectedEvent.eventName}</h2>
                                <p className="text-red-800 font-bold text-sm mb-6 flex items-center gap-1">
                                    <i data-lucide="users" size="14"></i>{selectedEvent.circleName}
                                </p>

                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                        <p className="text-[10px] font-bold text-gray-400 mb-1 tracking-widest">DATE / TIME</p>
                                        <p className="text-xs font-black text-gray-800">{selectedEvent.date}<br/>{selectedEvent.time}</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                        <p className="text-[10px] font-bold text-gray-400 mb-1 tracking-widest">PLACE</p>
                                        <p className="text-xs font-black text-gray-800">{selectedEvent.place}</p>
