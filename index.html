        const { useState, useEffect, useMemo } = React;

        const App = () => {

            const [selectedEvent, setSelectedEvent] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            
            // 最初から入っているデータ
            const [events, setEvents] = useState([
                {
                    id: 1,
                    circleName: "立命館大学 広告研究会",
                    eventName: "春の新歓映像祭",
                    date: "2026-04-10",
                    time: "18:00-20:00",
                    place: "衣笠 至善館",
                    genre: "文化",
                    description: "管理画面から新しい情報をどんどん追加できます！",
                    linkUrl: "https://instagram.com",
                    linkType: "Instagram"
                }
            ]);

            // フォーム用
            const [formData, setFormData] = useState({
                circleName: '', eventName: '', date: '', time: '', place: '', genre: 'スポーツ', description: '', linkUrl: '', linkType: 'Instagram'
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, isAdmin, showAddForm, events]);

            const handleAdminLogin = () => {
                const pass = prompt("管理者パスワードを入力してください\n(パスワード: ritsu2026)");
                if (pass === "ritsu2026") {
                    setIsAdmin(true);
                } else {
                    alert("パスワードが違います");
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newEvent = { ...formData, id: Date.now() };
                setEvents([newEvent, ...events]);
                setShowAddForm(false);
                setFormData({ circleName: '', eventName: '', date: '', time: '', place: '', genre: 'スポーツ', description: '', linkUrl: '', linkType: 'Instagram' });
            };

            const handleDelete = (id) => {
                if (confirm("この投稿を削除しますか？")) {
                    setEvents(events.filter(ev => ev.id !== id));
                }
            };

            const filteredEvents = events.filter(ev => 
                ev.circleName.includes(searchQuery) || ev.eventName.includes(searchQuery)
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-xl">
                    <header className="sticky top-0 z-30 bg-white border-b px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2" onClick={() => setView('list')}>
                            <div className="w-8 h-8 bg-red-800 rounded-lg flex items-center justify-center text-white font-black">R</div>
                            <h1 className="text-xl font-black text-gray-800">りつナビ</h1>
                        </div>
                        <div className="flex gap-2">
                            {isAdmin ? (
                                <>
                                    <button onClick={() => setShowAddForm(true)} className="bg-red-800 text-white p-2 rounded-full"><i data-lucide="plus" size="18"></i></button>
                                    <button onClick={() => setIsAdmin(false)} className="bg-gray-100 text-gray-400 p-2 rounded-full"><i data-lucide="log-out" size="18"></i></button>
                                </>
                            ) : (
                                <button onClick={handleAdminLogin} className="text-[10px] font-black text-gray-300 border px-3 py-1 rounded-full uppercase tracking-widest">Admin</button>
                            )}
                        </div>
                    </header>

                    {view === 'list' ? (
                        <div className="flex-1 p-4 space-y-4">
                            <input 
                                type="text" 
                                placeholder="サークルを検索" 
                                className="w-full bg-gray-50 border border-gray-100 rounded-xl p-3 text-sm focus:outline-none mb-2"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            {filteredEvents.map(ev => (
                                <div key={ev.id} className="bg-white rounded-3xl border border-gray-100 shadow-sm p-5 relative" onClick={() => { setSelectedEvent(ev); setView('detail'); }}>
                                    <div className="flex justify-between items-start mb-2">
                                        <span className="text-[10px] font-black text-red-800 bg-red-50 px-2 py-0.5 rounded-full uppercase tracking-tighter">{ev.genre}</span>
                                        {isAdmin && (
                                            <button onClick={(e) => { e.stopPropagation(); handleDelete(ev.id); }} className="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                                        )}
                                    </div>
                                    <h3 className="text-lg font-black text-gray-800 leading-tight">{ev.eventName}</h3>
                                    <p className="text-xs text-gray-500 mb-3">{ev.circleName}</p>
                                    <div className="flex gap-3 text-[10px] text-gray-400 font-bold tracking-tight">
                                        <span>📅 {ev.date}</span>
                                        <span>📍 {ev.place}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="flex-1 bg-white p-6 animate-in slide-in-from-right duration-300">
                            <button onClick={() => setView('list')} className="mb-6 text-gray-400 font-bold flex items-center gap-1">← 戻る</button>
                            <h2 className="text-2xl font-black text-gray-800 mb-1">{selectedEvent.eventName}</h2>
                            <p className="text-red-800 font-black text-sm mb-8 underline">{selectedEvent.circleName}</p>
                            <div className="bg-gray-50 p-5 rounded-2xl mb-8 space-y-2">
                                <p className="text-sm font-bold">📅 日時: {selectedEvent.date} {selectedEvent.time}</p>
                                <p className="text-sm font-bold">📍 場所: {selectedEvent.place}</p>
                            </div>
                            <p className="text-sm text-gray-600 leading-relaxed mb-20 whitespace-pre-wrap">{selectedEvent.description}</p>
                            <a href={selectedEvent.linkUrl} target="_blank" className="fixed bottom-6 left-6 right-6 max-w-md mx-auto block bg-red-800 text-white text-center py-4 rounded-2xl font-black text-lg shadow-xl">
                                {selectedEvent.linkType} で詳細を見る
                            </a>
                        </div>
                    )}

                    {showAddForm && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-end justify-center">
                            <div className="bg-white w-full max-w-md rounded-t-[32px] p-6 h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black italic">新歓情報を追加</h2>
                                    <button onClick={() => setShowAddForm(false)} className="text-gray-400">✕</button>
                                </div>
                                <form onSubmit={handleSubmit} className="space-y-4 pb-10">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400">サークル名</label>
                                        <input required className="w-full bg-gray-50 p-3 rounded-xl border border-gray-100 focus:outline-none" placeholder="立命館サークル" value={formData.circleName} onChange={e => setFormData({...formData, circleName: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400">イベント名</label>
                                        <input required className="w-full bg-gray-50 p-3 rounded-xl border border-gray-100 focus:outline-none" placeholder="春の新歓体験会" value={formData.eventName} onChange={e => setFormData({...formData, eventName: e.target.value})} />
                                    </div>
