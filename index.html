```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りつナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('list');
            const [selectedEvent, setSelectedEvent] = useState(null);
            const [filterGenre, setFilterGenre] = useState('すべて');
            const [searchQuery, setSearchQuery] = useState('');
            const [showLinkModal, setShowLinkModal] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, showLinkModal, selectedEvent]);

            const events = [
                {
                    id: 1,
                    circleName: "立命館大学 広告研究会",
                    eventName: "春の新歓映像祭 & 交流会",
                    date: "2026-04-10",
                    time: "18:00 - 20:00",
                    place: "衣笠 至善館 1F",
                    price: "無料",
                    genre: "文化",
                    description: "CM制作やグラフィックデザインを行っています。新歓では過去の作品上映と先輩たちとのフリートークを楽しめます！",
                    linkUrl: "https://www.instagram.com/",
                    linkType: "Instagram"
                },
                {
                    id: 2,
                    circleName: "BKCテニスサークル R-Shot",
                    eventName: "体験練習会 @テニスコート",
                    date: "2026-04-12",
                    time: "13:00 - 16:00",
                    place: "BKC テニスコート第3",
                    price: "500円",
                    genre: "スポーツ",
                    description: "BKC最大級のテニスサークルです！経験者はもちろん、大学から始めたい人も大歓迎です。",
                    linkUrl: "https://line.me/",
                    linkType: "公式LINE"
                }
            ];

            const filteredEvents = useMemo(() => {
                return events
                    .filter(ev => filterGenre === 'すべて' || ev.genre === filterGenre)
                    .filter(ev => ev.circleName.includes(searchQuery) || ev.eventName.includes(searchQuery));
            }, [filterGenre, searchQuery]);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col relative overflow-x-hidden shadow-xl">
                    <div className="sticky top-0 z-20 bg-white border-b px-4 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-red-800 rounded-lg flex items-center justify-center text-white font-black text-xs text-center">R</div>
                            <h1 className="text-xl font-black text-gray-800 tracking-tight">りつナビ</h1>
                        </div>
                    </div>

                    {view === 'list' ? (
                        <div className="flex-1">
                            <div className="p-4 bg-white border-b">
                                <input 
                                    type="text"
                                    placeholder="サークルやイベントを検索"
                                    className="w-full bg-gray-100 rounded-xl py-3 px-4 text-sm focus:outline-none mb-4"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                    {['すべて', 'スポーツ', '文化', '音楽', 'ボランティア'].map(g => (
                                        <button
                                            key={g}
                                            onClick={() => setFilterGenre(g)}
                                            className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap border transition-all ${filterGenre === g ? 'bg-red-800 border-red-800 text-white shadow-md' : 'bg-white border-gray-200 text-gray-500'}`}
                                        >
                                            {g}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="p-4 space-y-4">
                                {filteredEvents.map(event => (
                                    <div key={event.id} className="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm active:scale-[0.98] transition-transform" onClick={() => { setSelectedEvent(event); setView('detail'); }}>
                                        <div className="h-32 bg-red-50 flex items-center justify-center font-black text-red-800/10 text-5xl">{event.circleName[0]}</div>
                                        <div className="p-4">
                                            <p className="text-[10px] font-bold text-red-800">{event.circleName}</p>
                                            <h3 className="text-lg font-black text-gray-800 mb-2">{event.eventName}</h3>
                                            <div className="flex gap-3 text-[10px] text-gray-400 font-bold">
                                                <span>📅 {event.date}</span>
                                                <span>📍 {event.place}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 bg-white">
                            <div className="relative h-48 bg-red-900 flex items-center justify-center">
                                <button onClick={() => setView('list')} className="absolute top-4 left-4 bg-white/20 text-white p-2 rounded-full">←</button>
                                <span className="text-white/10 font-black text-[120px]">{selectedEvent.circleName[0]}</span>
                            </div>
                            <div className="p-6 -mt-8 bg-white rounded-t-[32px] min-h-screen shadow-2xl">
                                <h2 className="text-2xl font-black text-gray-800">{selectedEvent.eventName}</h2>
                                <p className="text-red-800 font-bold text-sm mb-6 underline underline-offset-4">{selectedEvent.circleName}</p>
                                <div className="grid grid-cols-2 gap-3 mb-8">
                                    <div className="bg-gray-50 p-4 rounded-2xl">
                                        <p className="text-[10px] text-gray-400 font-bold">DATE/TIME</p>
                                        <p className="text-xs font-black">{selectedEvent.date}<br/>{selectedEvent.time}</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-2xl">
                                        <p className="text-[10px] text-gray-400 font-bold">PLACE</p>
                                        <p className="text-xs font-black">{selectedEvent.place}</p>
                                    </div>
                                </div>
                                <p className="text-sm text-gray-600 leading-relaxed mb-32">{selectedEvent.description}</p>
                                <div className="fixed bottom-6 left-6 right-6 max-w-md mx-auto">
                                    <button onClick={() => setShowLinkModal(true)} className="w-full bg-red-800 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-red-900/20 active:scale-95 transition-transform">
                                        詳細・申し込み先へ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showLinkModal && (
                        <div className="fixed inset-0 z-50 bg-black/60 flex items-end justify-center p-4">
                            <div className="bg-white w-full rounded-[32px] p-8 text-center">
                                <h3 className="text-xl font-black mb-2">リンク先へ移動</h3>
                                <p className="text-sm text-gray-500 mb-8 font-bold">「{selectedEvent.linkType}」へ移動しますか？</p>
                                <button onClick={() => { window.open(selectedEvent.linkUrl, '_blank'); setShowLinkModal(false); }} className="w-full bg-red-800 text-white py-4 rounded-2xl font-black mb-2">移動する</button>
                                <button onClick={() => setShowLinkModal(false)} className="w-full py-4 text-gray-400 font-bold">キャンセル</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
