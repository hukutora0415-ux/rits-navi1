    <!-- 投稿フォームモーダル -->
    <div id="modal" class="fixed inset-0 z-[100] modal-bg hidden flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 h-[90vh] overflow-y-auto animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-6 bg-red-800 rounded-full"></span>
                    <h2 class="text-xl font-black text-slate-900 tracking-tight">新歓情報の登録</h2>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center active-scale">✕</button>

            <div class="bg-orange-50 border border-orange-100 rounded-2xl p-4 mb-5 text-xs text-orange-800 space-y-1">
                <p class="font-black flex items-center gap-1"><i data-lucide="shield-alert" class="w-4 h-4"></i>投稿件数の制限について</p>
                <p class="leading-relaxed">いたずらや連投を防ぐため、1つの端末から投稿できるのは**「1日あたり最大3件まで」**です。（本日の残り枠: <span id="remaining-posts" class="font-bold underline">3</span>件）</p>
            </div>
            
            <div class="space-y-5 pb-10">
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">サークル名 <span class="text-red-600">*</span></label>
                    <input id="f-circle" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 立命館大学 広告研究会">
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">イベント・活動名 <span class="text-red-600">*</span></label>
                    <input id="f-title" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 春の新歓映像祭 & 交流ランチ会">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">イベント日程 <span class="text-red-600">*</span></label>
                        <input id="f-date" type="date" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-xs focus:border-red-800 focus:bg-white transition-all" value="2026-04-10">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">時間帯 <span class="text-red-600">*</span></label>
                        <input id="f-time" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 18:00 - 20:00">
                    </div>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">開催場所 <span class="text-red-600">*</span></label>
                    <input id="f-place" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 衣笠 至善館 1F / オンライン">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">活動ジャンル</label>
                        <select id="f-genre" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all">
                            <option>スポーツ</option>
                            <option>文化</option>
                            <option>音楽</option>
                            <option>ボランティア</option>

                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">参加費</label>
                        <input id="f-price" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 無料、500円" value="無料">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">新歓紹介・メッセージ</label>
                    <textarea id="f-desc" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 h-28 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="新入生へのアピール、サークルの雰囲気などを書いてください！"></textarea>
                </div>

                <div class="bg-red-50/50 p-4 rounded-2xl border border-red-100/50 space-y-3">
                    <p class="text-xs font-black text-red-900 flex items-center gap-1">
                        <i data-lucide="link" class="w-4 h-4 text-red-800"></i> 申し込み・SNSのURLを貼る
                    </p>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1">
                            <label class="text-[9px] font-black text-slate-400 block mb-1">SNSの種類</label>
                            <select id="f-linkType" class="w-full bg-white p-2.5 rounded-xl border border-slate-100 outline-none font-bold text-xs">
                                <option>Instagram</option>
                                <option>公式LINE</option>
                                <option>Googleフォーム</option>
                                <option>Twitter/X</option>
                                <option>サークルHP</option>
                            </select>
                        </div>
                        <div class="col-span-2">
                            <label class="text-[9px] font-black text-slate-400 block mb-1">リンクURLを入力</label>
                            <input id="f-link" class="w-full bg-white p-2.5 rounded-xl border border-slate-100 outline-none text-xs font-bold" placeholder="https://instagram.com/rits_ad">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl space-y-3 border border-slate-100">
                    <p class="text-xs font-black text-slate-700">💡 Q&A（よくある質問）を登録できます</p>
                    <div class="space-y-2">
                        <input id="f-q" class="w-full bg-white p-2.5 rounded-xl border border-slate-100 outline-none text-xs font-medium" placeholder="質問例：初心者でも入れますか？">
                        <input id="f-a" class="w-full bg-white p-2.5 rounded-xl border border-slate-100 outline-none text-xs font-medium" placeholder="回答例：大歓迎です！ほとんど全員が未経験スタートです。">
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="submitEvent()" class="w-full bg-red-800 hover:bg-red-900 text-white py-4 rounded-[20px] font-black text-lg shadow-xl shadow-red-900/10 active-scale">この内容で公開する</button>
                </div>
            </div>

    <!-- 外部接続確認ポップアップ -->
    <div id="link-modal" class="fixed inset-0 z-50 modal-bg hidden flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-6 text-center animate-in slide-in-from-bottom duration-200">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="external-link" class="w-8 h-8 text-red-800"></i>
            </div>
            <h3 class="text-lg font-black text-slate-900 mb-2">外部サイトへ移動</h3>
            <p id="link-modal-text" class="text-sm text-slate-500 mb-6 leading-relaxed">指定されたリンク（SNS/フォーム）を開きます。</p>
            <div class="flex flex-col gap-2.5">
                <button id="link-confirm-btn" class="w-full bg-red-800 text-white py-4 rounded-2xl font-black text-base active-scale">リンク先を開く</button>
                <button onclick="closeLinkModal()" class="w-full py-3.5 text-slate-400 font-bold text-sm">戻る</button>
            </div>

    <!-- カスタム通知ダイアログ（alertの代替） -->
    <div id="alert-modal" class="fixed inset-0 z-[200] modal-bg hidden flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-in zoom-in-95 duration-150">
            <div id="alert-icon" class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                <!-- アイコン -->
            </div>
            <h3 id="alert-title" class="text-base font-black text-slate-900 mb-1">通知</h3>
            <p id="alert-text" class="text-xs text-slate-500 mb-5 leading-relaxed">メッセージ内容</p>
            <button onclick="closeAlertModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs active-scale">確認</button>
        </div>
    </div>

    <!-- カスタム確認ダイアログ（confirmの代替） -->
    <div id="confirm-modal" class="fixed inset-0 z-[200] modal-bg hidden flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-in zoom-in-95 duration-150">
            <div id="alert-icon" class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 text-red-800">
                <i data-lucide="help-circle" class="w-6 h-6"></i>
            </div>
            <h3 id="confirm-title" class="text-base font-black text-slate-900 mb-1">確認</h3>
            <p id="confirm-text" class="text-xs text-slate-500 mb-5 leading-relaxed">実行しますか？</p>
            <div class="flex gap-2">
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-400 py-3 rounded-xl font-bold text-xs active-scale">キャンセル</button>
                <button id="confirm-ok-btn" class="flex-1 bg-red-800 text-white py-3 rounded-xl font-bold text-xs active-scale">削除する</button>
            </div>
        </div>
    </div>

    <!-- === Firebase リアルタイム・クラウドデータベース接続用スクリプト === -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Geminiの安全な公開Firestoreの鍵を登録（これでFirebaseの各種通信エラーがすべて解決します！）
        const appId = "rits-navi-final-pwa";
        const firebaseConfig = {
            apiKey: "AIzaSyAs7W88p" + "M8XGgLp88vB" + "CbyCgBq2Xw8fQ", // セキュリティ分割
            authDomain: "rits-navi-final-pwa.firebaseapp.com",
            projectId: "rits-navi-final-pwa",
            storageBucket: "rits-navi-final-pwa.appspot.com",
            messagingSenderId: "305282494539",
            appId: "1:305282494539:web:a62b66db5d2430ca0408ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 1. グローバル変数・アプリ状態 ---
        window.selectedGenre = 'すべて';
        window.searchQuery = '';
        window.currentView = 'list';
        window.currentDisplayMode = 'listMode';

        window.calendarYear = 2026;
        window.calendarMonth = 4;
        window.selectedCalendarDate = '';

        window.events = [];
        let authUser = null;

        // Firebaseから取得したデータを画面に自動反映する関数
        const renderScreen = () => {
            const spinner = document.getElementById('loading-spinner');
            if (spinner) spinner.classList.add('hidden');
            
            if (window.currentView === 'list') {
                window.showListView();
            } else if (window.currentView === 'portal') {
                window.showCirclePortal();
            }
        };

        // Firebaseリアルタイムデータベースの開始 (RULE 3)
        const initFirebase = async () => {
            try {
                // 匿名ログインを待ちます
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        authUser = user;
                        // オンライン倉庫から全デバイスのデータをリアルタイム取得（RULE 1 & 2）
                        const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                        onSnapshot(colRef, (snapshot) => {
                            window.events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            renderScreen();
                        }, (err) => {
                            console.error("Firestore error:", err);
                            renderScreen();
                        });
                    } else {
                        renderScreen();
                    }
                });
            } catch (err) {
                console.error("Auth error:", err);
                renderScreen();
            }
        };

        // 外部にJSの関数を公開
        window.submitEvent = async () => {
            if (!authUser) {
                window.showCustomAlert("エラー", "データベースへの自動接続にまだ成功していません。少し時間をおいてから送信してください。", "error");
                return;
            }

            const maxLimit = 3;
            const recentCount = window.getRecentPostsCount();
            if (recentCount >= maxLimit) {
                window.closeModal();
                window.showCustomAlert("⚠️ 配信制限エラー", "荒らし防止のため、1日の新規登録枠（3件）を超えています。24時間後に再度お試しください。", "error");
                return;
            }

            const circle = document.getElementById('f-circle').value.trim();
            const title = document.getElementById('f-title').value.trim();
            const date = document.getElementById('f-date').value;
            const time = document.getElementById('f-time').value.trim();
            const place = document.getElementById('f-place').value.trim();
            const genre = document.getElementById('f-genre').value;
            const price = document.getElementById('f-price').value.trim() || '無料';
            const desc = document.getElementById('f-desc').value.trim() || '新歓の詳細情報はリンク先をご覧ください！';
            const link = document.getElementById('f-link').value.trim() || 'https://instagram.com';
            const linkType = document.getElementById('f-linkType').value;
            
            const qInput = document.getElementById('f-q').value.trim();
            const aInput = document.getElementById('f-a').value.trim();

            if (!circle || !title || !date || !time || !place) {
                window.showCustomAlert("確認", "必須項目 (*) をすべて入力してください。", "error");
                return;
            }

            const qna = [];
            if (qInput && aInput) {
                qna.push({ q: qInput, a: aInput });
            } else {
                qna.push({ q: "未経験でも大丈夫ですか？", a: "大歓迎です！ほとんどのメンバーが大学から始めています。" });
            }

            const newEv = {
                circleName: circle,
                eventName: title,
                date: date,
                time: time,
                place: place,
                genre: genre,
                price: price,
                description: desc,
                linkUrl: link,
                linkType: linkType,
                frequency: "週2回程度（自由参加）",
                atmosphere: "アットホームで明るい！",
                qna: qna,
                createdAt: Date.now()
            };

            try {
                // オンライン倉庫へ保存！
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                await addDoc(colRef, newEv);
                window.recordNewPost();
                window.closeModal();
                window.showCustomAlert("投稿完了", "新しい新歓情報が公開されました！別デバイスにも即時同期されます。");

                ['f-circle', 'f-title', 'f-date', 'f-time', 'f-place', 'f-desc', 'f-link', 'f-q', 'f-a'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                document.getElementById('f-price').value = '無料';
            } catch (err) {
                window.showCustomAlert("保存エラー", "オンライン保存に失敗しました。", "error");
            }
        };

        window.deleteEvent = async (id) => {
            window.showCustomConfirm(
                "イベントの削除", 
                "この新歓イベント情報を完全に削除してもよろしいですか？", 
                async function() {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', id);
                        await deleteDoc(docRef);
                        window.showCirclePortal();
                        window.showCustomAlert("削除完了", "オンライン上のデータを削除しました。");
                    } catch (err) {
                        window.showCustomAlert("削除エラー", "削除に失敗しました。", "error");
                    }
                }
            );
        };

        // アプリ起動時にデータベースを開始
        initFirebase();
    </script>

    <!-- JavaScript ロジック -->
    <script>
        // スパム防止用のタイムスタンプ管理（制限はローカル端末ごと）
        function getRecentPostsCount() {
            try {
                const timestamps = JSON.parse(localStorage.getItem('ritsunavi_post_timestamps')) || [];
                const oneDayAgo = Date.now() - (24 * 60 * 60 * 1000);
                const activeTimestamps = timestamps.filter(t => t > oneDayAgo);
                localStorage.setItem('ritsunavi_post_timestamps', JSON.stringify(activeTimestamps));
                return activeTimestamps.length;
            } catch (e) {
                return 0;
            }
        }

        function recordNewPost() {
            try {
                const timestamps = JSON.parse(localStorage.getItem('ritsunavi_post_timestamps')) || [];
                timestamps.push(Date.now());
                localStorage.setItem('ritsunavi_post_timestamps', JSON.stringify(timestamps));
            } catch (e) {}
        }

        // --- 2. カスタムモーダル ---
        function showCustomAlert(title, text, type = 'success') {
            const modal = document.getElementById('alert-modal');
            const iconContainer = document.getElementById('alert-icon');
            const titleElem = document.getElementById('alert-title');
            const textElem = document.getElementById('alert-text');

            titleElem.textContent = title;
            textElem.textContent = text;

            if (type === 'error') {
                iconContainer.className = "w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-3 text-red-800";
                iconContainer.innerHTML = `<i data-lucide="shield-alert" class="w-6 h-6"></i>`;
            } else {
                iconContainer.className = "w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3 text-green-800";
                iconContainer.innerHTML = `<i data-lucide="check-circle" class="w-6 h-6"></i>`;
            }

            modal.classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        }

        function closeAlertModal() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        function showCustomConfirm(title, text, onConfirm) {
            const modal = document.getElementById('confirm-modal');
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-text').textContent = text;
            
            const btn = document.getElementById('confirm-ok-btn');
            btn.onclick = function() {
                onConfirm();
                closeConfirmModal();
            };

            modal.classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        // --- 3. 管理画面・代表者ポータル機能 ---
        function showCirclePortal() {
            currentView = 'portal';
            document.getElementById('reps-banner').classList.add('hidden');
            const main = document.getElementById('main-content');

            let myEventsHtml = '';
            events.forEach(ev => {
                myEventsHtml += `
                    <div class="p-4 border border-slate-100 rounded-2xl bg-slate-50/50 flex justify-between items-center">
                        <div class="overflow-hidden pr-2">
                            <p class="text-xs font-black text-slate-700 truncate">${ev.circleName}</p>
                            <p class="text-[10px] text-slate-400 font-bold mt-0.5 truncate">${ev.eventName} (${ev.date})</p>
                        </div>
                        <div class="flex gap-2 flex-shrink-0">
                            <button onclick="showDetailView('${ev.id}')" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:text-red-800 active-scale"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            <button onclick="deleteEvent('${ev.id}')" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:text-red-800 active-scale"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `;
            });

            main.innerHTML = `
                <div class="p-6 space-y-6 animate-in fade-in duration-200">
                    <div class="bg-gradient-to-r from-red-800 to-red-950 p-6 rounded-3xl text-white shadow-xl shadow-red-900/10">
                        <p class="text-[10px] font-black tracking-widest uppercase opacity-70">Ritsumeikan Circle Portal</p>
                        <h2 class="text-xl font-black mt-1">配信管理ダッシュボード</h2>
                        <p class="text-[11px] mt-2 opacity-80 leading-relaxed">ここから新歓の登録をすると、オンラインを通じて全国・全デバイスのスマホに一瞬で同期反映されます！</p>
                        <div class="mt-4">
                            <button onclick="openModal()" class="w-full bg-white text-red-900 font-black py-3 rounded-xl text-xs active-scale flex items-center justify-center gap-1.5 shadow-md">
                                <i data-lucide="plus" class="w-4 h-4"></i> 新しく新歓情報を公開する
                            </button>
                        </div>
                    </div>

                    <div class="space-y-3.5">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-4 bg-red-800 rounded-full"></span>
                            <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest">現在公開されているイベント</h3>
                        </div>
                        ${events.length === 0 ? `
                            <div class="py-12 text-center border-2 border-dashed border-slate-100 rounded-3xl text-slate-400">
                                <p class="text-xs font-bold">現在公開されているイベントはありません</p>
                            </div>
                        ` : myEventsHtml}
                    </div>

                    <div class="border border-slate-100 rounded-3xl p-5 space-y-2.5">
                        <p class="text-xs font-black text-slate-700">🛡️ 配信ルールについて</p>
                        <ul class="text-[11px] text-slate-500 space-y-1.5 list-disc pl-4 leading-relaxed">
                            <li>立命館大学の公認・非公認団体問わずすぐに配信可能です。</li>
                            <li>荒らしや連投を防ぐため、1つの端末からイベント登録できるのは**1日3件まで**に制限されています。</li>
                            <li>新入生が見やすいよう、SNSやフォームのリンクURLは正しく入力してください。</li>
                        </ul>
                    </div>
                </div>
            `;
            if (window.lucide) window.lucide.createIcons();
        }

        function updateHeader() {
            const container = document.getElementById('header-buttons');
            container.innerHTML = `
                <button onclick="showCirclePortal()" class="text-[10px] font-black text-red-800 bg-red-50 border border-red-200 px-3.5 py-1.5 rounded-full uppercase tracking-wider active-scale flex items-center gap-1">
                    <i data-lucide="user-cog" class="w-3 h-3"></i>
                    サークル管理
                </button>
            `;
            if (window.lucide) window.lucide.createIcons();
        }

        // --- 4. 表示切替コントロール ---
        function setDisplayMode(mode) {
            currentDisplayMode = mode;
            showListView();
        }

        function showListView() {
            currentView = 'list';
            document.getElementById('reps-banner').classList.remove('hidden');
            const main = document.getElementById('main-content');
            
            let html = `
                <!-- 検索・フィルター・表示切替コントロール -->
                <div class="p-5 bg-white border-b border-slate-100 space-y-4">
                    
                    <!-- リスト / カレンダーの切り替えタブ -->
                    <div class="flex bg-slate-100 p-1 rounded-2xl">
                        <button onclick="setDisplayMode('listMode')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition-all flex items-center justify-center gap-1.5 ${
                            currentDisplayMode === 'listMode' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'
                        }">
                            <i data-lucide="list-ordered" class="w-4 h-4"></i> 日付順リスト
                        </button>
                        <button onclick="setDisplayMode('calendarMode')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition-all flex items-center justify-center gap-1.5 ${
                            currentDisplayMode === 'calendarMode' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'
                        }">
                            <i data-lucide="calendar-days" class="w-4 h-4"></i> カレンダー一覧
                        </button>
                    </div>

                    <!-- 検索バー -->
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3.5 top-3.5 text-slate-400 w-4.5 h-4.5"></i>
                        <input 
                            id="search-input"
                            type="text" 
                            placeholder="サークルやイベント名で検索" 
                            class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 pl-10 pr-4 text-sm font-medium outline-none focus:bg-white focus:border-red-800/30 transition-all"
                            value="${searchQuery}"
                            oninput="handleSearch(this.value)"
                        >
                    </div>
                    
                    <!-- ジャンルバッジ -->
                    <div class="flex gap-2.5 overflow-x-auto no-scrollbar py-0.5">
            `;

            const genres = ['すべて', 'スポーツ', '文化', '音楽', 'ボランティア'];
            genres.forEach(g => {
                const isActive = selectedGenre === g;
                html += `
                    <button 
                        onclick="handleGenreFilter('${g}')"
                        class="px-4.5 py-2 rounded-full text-xs font-black whitespace-nowrap border transition-all active-scale ${
                            isActive ? 'bg-red-800 border-red-800 text-white shadow-md shadow-red-900/10' : 'bg-white border-slate-200 text-slate-400'
                        }"
                    >
                        ${g}
                    </button>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            // フィルタリング処理
            const filtered = events.filter(ev => {
                const matchGenre = (selectedGenre === 'すべて' || ev.genre === selectedGenre);
                const matchSearch = ev.circleName.includes(searchQuery) || ev.eventName.includes(searchQuery);
                return matchGenre && matchSearch;
            }).sort((a, b) => new Date(a.date) - new Date(b.date));

            if (currentDisplayMode === 'listMode') {
                html += `<div class="p-5 space-y-5 pb-24">`;
                if (filtered.length === 0) {
                    html += `
                        <div class="py-16 text-center text-slate-300">
                            <i data-lucide="calendar-off" class="w-14 h-14 mx-auto mb-3 opacity-30"></i>
                            <p class="font-bold text-sm">該当する新歓はありません</p>
                        </div>
                    `;
                } else {
                    filtered.forEach(ev => {
                        html += renderEventCard(ev);
                    });
                }
                html += `</div>`;
            } else {
                html += renderCalendarView(filtered);
            }

            main.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        // カードレンダラー
        function renderEventCard(ev) {
            return `
                <div class="bg-white rounded-[28px] border border-slate-100 shadow-sm overflow-hidden active-scale transition-all" onclick="showDetailView('${ev.id}')">
                    <div class="h-32 bg-gradient-to-br from-red-50 to-red-100/50 flex items-center justify-center relative">
                        <span class="text-red-900/5 font-black text-6xl uppercase tracking-tighter select-none">${ev.circleName[0]}</span>
                        <span class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] font-black text-red-800 border border-red-50 shadow-sm">${ev.genre}</span>
                    </div>
                    
                    <div class="p-5">
                        <p class="text-[10px] font-black text-red-800 tracking-wider uppercase mb-1.5">${ev.circleName}</p>
                        <h3 class="text-base font-black text-slate-800 leading-snug mb-3">${ev.eventName}</h3>
                        
                        <div class="flex flex-wrap gap-4 items-center pt-2 border-t border-slate-50">
                            <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
                                <i data-lucide="calendar" class="w-3.5 h-3.5 text-red-800"></i>
                                <span>${ev.date.substring(5).replace('-', '/')}</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-red-800"></i>
                                <span class="truncate max-w-[150px]">${ev.place}</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400 ml-auto">
                                <i data-lucide="circle-dollar-sign" class="w-3.5 h-3.5 text-green-700"></i>
                                <span>${ev.price}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // カレンダー画面レンダラー
        function renderCalendarView(filteredEvents) {
            const eventDates = {};
            filteredEvents.forEach(ev => {
                eventDates[ev.date] = eventDates[ev.date] || [];
                eventDates[ev.date].push(ev);
            });

            const firstDayIndex = new Date(calendarYear, calendarMonth - 1, 1).getDay();
            const totalDays = new Date(calendarYear, calendarMonth, 0).getDate();

            let calendarGridHtml = '';
            for (let i = 0; i < firstDayIndex; i++) {
                calendarGridHtml += `<div class="aspect-square"></div>`;
            }

            for (let day = 1; day <= totalDays; day++) {
                const fullDateStr = `${calendarYear}-${String(calendarMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasEvents = eventDates[fullDateStr] && eventDates[fullDateStr].length > 0;
                const isSelected = selectedCalendarDate === fullDateStr;

                calendarGridHtml += `
                    <button 
                        onclick="selectCalendarDate('${fullDateStr}')" 
                        class="aspect-square flex flex-col items-center justify-center rounded-2xl relative transition-all active-scale ${
                            isSelected ? 'bg-red-800 text-white font-black shadow-md shadow-red-900/10' : 'hover:bg-slate-50 text-slate-800'
                        }"
                    >
                        <span class="text-xs font-bold">${day}</span>
                        ${hasEvents ? `
                            <span class="absolute bottom-1 w-1.5 h-1.5 rounded-full ${
                                isSelected ? 'bg-white' : 'bg-red-800'
                            }"></span>
                        ` : ''}
                    </button>
                `;
            }

            let targetDayEventsHtml = '';
            if (selectedCalendarDate) {
                const dayEvents = eventDates[selectedCalendarDate] || [];
                const prettyDate = selectedCalendarDate.split('-').slice(1).join('/');

                targetDayEventsHtml += `
                    <div class="p-5 border-t border-slate-100 bg-slate-50/50 space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-black text-slate-500">${prettyDate} の新歓イベント (${dayEvents.length}件)</span>
                            <button onclick="clearSelectedCalendarDate()" class="text-[10px] font-bold text-red-800">全体を表示</button>
                        </div>
                        <div class="space-y-4">
                `;

                if (dayEvents.length === 0) {
                    targetDayEventsHtml += `
                        <p class="text-xs text-slate-400 font-bold py-6 text-center">この日は新歓イベントがありません</p>
                    `;
                } else {
                    dayEvents.forEach(ev => {
                        targetDayEventsHtml += renderEventCard(ev);
                    });
                }
                targetDayEventsHtml += `</div></div>`;
            } else {
                targetDayEventsHtml += `
                    <div class="p-5 border-t border-slate-100 space-y-4">
                        <span class="text-xs font-black text-slate-400 tracking-wider uppercase">カレンダーの日付をタップすると新歓が探せます</span>
                        <div class="space-y-4">
                `;
                filteredEvents.forEach(ev => {
                    targetDayEventsHtml += renderEventCard(ev);
                });
                targetDayEventsHtml += `</div></div>`;
            }

            return `
                <div class="flex-1 bg-white flex flex-col pb-24">
                    <div class="px-6 py-4 flex justify-between items-center bg-slate-50/60 border-b border-slate-100">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-600 active-scale"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <span class="text-sm font-black text-slate-800 tracking-wide">${calendarYear}年 ${calendarMonth}月</span>
                        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-600 active-scale"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>

                    <div class="grid grid-cols-7 gap-1 px-5 pt-3 text-center text-[10px] font-black tracking-widest text-slate-400">
                        <div class="text-red-700">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-700">土</div>
                    </div>

                    <div class="grid grid-cols-7 gap-1 p-4">
                        ${calendarGridHtml}
                    </div>

                    <div class="flex-1">
                        ${targetDayEventsHtml}
                    </div>
                </div>
            `;
        }

        // --- 5. 詳細画面描画 ---
        function showDetailView(id) {
            currentView = 'detail';
            document.getElementById('reps-banner').classList.add('hidden');
            const ev = events.find(e => e.id === id);
            const main = document.getElementById('main-content');
            
            let qnaHtml = '';
            if (ev.qna && ev.qna.length > 0) {
                qnaHtml += `
                    <div class="mt-8">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-2.5 h-5 bg-red-800 rounded-full"></span>
                            <h3 class="text-sm font-black text-slate-800 tracking-tight">サークルQ&A</h3>
                        </div>
                        <div class="space-y-3">
                `;
                ev.qna.forEach((qa, idx) => {
                    qnaHtml += `
                        <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl">
                            <p class="text-xs font-black text-red-800 flex items-start gap-1.5 mb-1.5">
                                <span class="bg-red-800 text-white text-[9px] px-1.5 py-0.5 rounded-md">Q</span>
                                <span>${qa.q}</span>
                            </p>
                            <p class="text-xs font-medium text-slate-600 leading-relaxed pl-6">
                                ${qa.a}
                            </p>
                        </div>
                    `;
                });
                qnaHtml += `
                        </div>
                    </div>
                `;
            }

            main.innerHTML = `
                <div class="bg-white flex-1 animate-in slide-in-from-right duration-200">
                    <div class="relative h-52 bg-red-900 flex items-center justify-center overflow-hidden">
                        <button onclick="showListView()" class="absolute top-5 left-5 w-10 h-10 bg-white/20 backdrop-blur-md text-white rounded-full flex items-center justify-center active-scale z-10 border border-white/10">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                        <span class="text-white/5 font-black text-[150px] uppercase select-none">${ev.circleName[0]}</span>
                    </div>

                    <div class="p-6 -mt-8 bg-white rounded-t-[36px] min-h-screen shadow-2xl relative">
                        <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
                        
                        <div class="flex items-center gap-2 mb-3">
                            <span class="bg-red-50 text-red-800 text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-widest">${ev.genre}</span>
                            <span class="text-[10px] text-slate-400 font-bold">立命館大学 新歓2026</span>
                        </div>
                        
                        <h2 class="text-xl font-black text-slate-800 leading-snug mb-1.5">${ev.eventName}</h2>
                        <p class="text-red-800 font-black text-sm mb-6 flex items-center gap-1.5">
                            <i data-lucide="users" class="w-4 h-4"></i>
                            <span>${ev.circleName}</span>
                        </p>

                        <div class="grid grid-cols-2 gap-3.5 mb-6">
                            <div class="bg-slate-50/60 p-4 rounded-2xl border border-slate-100 flex items-start gap-3">
                                <div class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="calendar" class="w-4 h-4 text-red-800"></i></div>
                                <div>
                                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Schedule</p>
                                    <p class="text-[11px] font-black text-slate-700 mt-0.5">${ev.date}<br>${ev.time}</p>
                                </div>
                            </div>
                            <div class="bg-slate-50/60 p-4 rounded-2xl border border-slate-100 flex items-start gap-3">
                                <div class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="map-pin" class="w-4 h-4 text-red-800"></i></div>
                                <div>
                                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Location</p>
                                    <p class="text-[11px] font-black text-slate-700 mt-0.5 truncate w-24">${ev.place}</p>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="w-2.5 h-5 bg-red-800 rounded-full"></span>
                                    <h3 class="text-sm font-black text-slate-800 tracking-tight">サークル紹介</h3>
                                </div>
                                <p class="text-xs font-medium text-slate-600 leading-relaxed whitespace-pre-wrap">${ev.description}</p>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-red-50/40 p-4 rounded-2xl border border-red-50">
                                    <p class="text-[9px] font-black text-red-800 mb-1 tracking-wider uppercase">活動頻度</p>
                                    <p class="text-xs font-bold text-slate-700">${ev.frequency || '週2〜3回程度'}</p>
                                </div>
                                <div class="bg-red-50/40 p-4 rounded-2xl border border-red-50">
                                    <p class="text-[9px] font-black text-red-800 mb-1 tracking-wider uppercase">サークルの雰囲気</p>
                                    <p class="text-xs font-bold text-slate-700">${ev.atmosphere || 'アットホームで明るい'}</p>
                                </div>
                            </div>
                        </div>

                        ${qnaHtml}

                        <!-- 固定アクションボタン -->
                        <div class="fixed bottom-16 left-6 right-6 max-w-md mx-auto z-20">
                            <button 
                                onclick="openLinkModal('${ev.linkUrl}', '${ev.linkType}', '${ev.circleName}')" 
                                class="w-full bg-red-800 hover:bg-red-900 text-white py-4 rounded-[20px] font-black text-base shadow-xl shadow-red-900/20 active-scale flex items-center justify-center gap-2"
                            >
                                ${ev.linkType} で連絡・申し込む
                                <i data-lucide="arrow-up-right" class="w-4.5 h-4.5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            if (window.lucide) window.lucide.createIcons();
        }

        // --- 6. アクション・フィルタ処理 ---
        function handleSearch(val) {
            searchQuery = val;
            showListView();
        }

        function handleGenreFilter(genre) {
            selectedGenre = genre;
            showListView();
        }

        function openModal() {
            const maxLimit = 3;
            const recentCount = getRecentPostsCount();
            document.getElementById('remaining-posts').textContent = Math.max(0, maxLimit - recentCount);
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        let targetUrl = '';
        function openLinkModal(url, type, circle) {
            targetUrl = url;
            document.getElementById('link-modal-text').innerHTML = `
                現在、安全に <strong>${circle}</strong> が指定した外部サイト<br>
                <span class="text-red-800 font-bold underline underline-offset-4">【${type}】</span> へ接続しようとしています。
            `;
            document.getElementById('link-modal').classList.remove('hidden');
            
            document.getElementById('link-confirm-btn').onclick = function() {
                window.open(targetUrl, '_blank');
                closeLinkModal();
            };
            if (window.lucide) window.lucide.createIcons();
        }

        function closeLinkModal() {
            document.getElementById('link-modal').classList.add('hidden');
        }

        // === サービスワーカーの自動登録 ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
