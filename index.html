<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りつナビ - 立命館大学サークル新歓情報</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#800000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="りつナビ">

    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-scale:active { transform: scale(0.96); transition: all 0.1s ease; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative border-x border-slate-100 flex flex-col">
        
        <!-- ヘッダー -->
        <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-md border-b border-slate-100 px-5 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-2.5 cursor-pointer" onclick="window.showListView()">
                <div class="w-9 h-9 bg-red-800 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-red-900/20 active-scale">
                    <span>R</span>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-900 tracking-tight leading-none">りつナビ</h1>
                    <span class="text-[9px] text-red-800 font-bold tracking-widest uppercase">Live BBS</span>
                </div>
            </div>
            <div id="header-buttons" class="flex items-center gap-2">
                <button onclick="window.showCirclePortal()" class="text-[10px] font-black text-red-800 bg-red-50 border border-red-100 px-3.5 py-1.5 rounded-full uppercase tracking-wider active-scale flex items-center gap-1">
                    <i data-lucide="user-cog" class="w-3 h-3"></i> 自分の投稿
                </button>
            </div>
        </header>

        <!-- メイン画面表示エリア -->
        <main id="main-content" class="flex-1 flex flex-col overflow-y-auto">
            <div id="loading-spinner" class="flex-1 flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="w-8 h-8 border-4 border-red-800 border-t-transparent rounded-full animate-spin mb-3"></div>
                <p class="text-xs font-bold">データベースに接続中...</p>
                <p class="text-[10px] text-slate-400 mt-2">※初回は少し時間がかかります</p>
            </div>
        </main>

        <!-- ボトムナビゲーション -->
        <nav class="sticky bottom-0 bg-white/95 backdrop-blur-md border-t border-slate-100 py-3 px-8 flex justify-around items-center z-20">
            <button onclick="window.showListView()" class="flex flex-col items-center gap-1 text-red-800 active-scale">
                <i data-lucide="compass" class="w-5 h-5"></i>
                <span class="text-[9px] font-black">新歓を探す</span>
            </button>
            <button onclick="window.openModal()" class="relative -top-5 flex flex-col items-center justify-center w-14 h-14 bg-red-800 text-white rounded-full shadow-lg shadow-red-900/30 active-scale border-4 border-white">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
            <button onclick="window.showCirclePortal()" class="flex flex-col items-center gap-1 text-slate-400 active-scale">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold">自分の投稿</span>
            </button>
        </nav>
    </div>

    <!-- 投稿フォームモーダル -->
    <div id="modal" class="fixed inset-0 z-[100] modal-bg hidden flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[32px] p-6 h-[90vh] overflow-y-auto animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-6 bg-red-800 rounded-full"></span>
                    <h2 class="text-xl font-black text-slate-900 tracking-tight">新歓情報の書き込み</h2>
                </div>
                <button onclick="window.closeModal()" class="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center active-scale">✕</button>
            </div>
            
            <div class="space-y-5 pb-10">
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">サークル名 <span class="text-red-600">*</span></label>
                    <input id="f-circle" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 立命館大学 広告研究会">
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">イベント・活動名 <span class="text-red-600">*</span></label>
                    <input id="f-title" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 春の新歓映像祭 & 交流ランチ会">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">イベント日程 <span class="text-red-600">*</span></label>
                        <input id="f-date" type="date" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-xs focus:border-red-800 focus:bg-white transition-all" value="2026-04-10">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">時間帯 <span class="text-red-600">*</span></label>
                        <input id="f-time" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 18:00 - 20:00">
                    </div>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">開催場所 <span class="text-red-600">*</span></label>
                    <input id="f-place" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 衣笠 至善館 1F / オンライン">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">活動ジャンル</label>
                        <select id="f-genre" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all">
                            <option>スポーツ</option>
                            <option>文化</option>
                            <option>音楽</option>
                            <option>ボランティア</option>
                            <option>その他</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-black text-slate-500">参加費</label>
                        <input id="f-price" class="w-full bg-slate-50 p-3.5 rounded-2xl border border-slate-100 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="例: 無料" value="無料">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-black text-slate-500">新歓紹介・メッセージ</label>
                    <textarea id="f-desc" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 h-28 outline-none font-medium text-sm focus:border-red-800 focus:bg-white transition-all" placeholder="新入生へのアピール、サークルの雰囲気などを書いてください！"></textarea>
                </div>

                <!-- 削除用パスワード -->
                <div class="bg-slate-800 p-4 rounded-2xl space-y-2 text-white shadow-inner">
                    <label class="text-xs font-black text-slate-200 flex items-center gap-1.5">
                        <i data-lucide="key" class="w-4 h-4"></i> 削除用パスワード (必須)
                    </label>
                    <p class="text-[10px] text-slate-400 mb-2">※他のスマホからこの投稿を消す時に必要になります。適当な4桁の数字を入れてください。</p>
                    <input id="f-password" type="password" maxlength="4" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none font-bold text-center tracking-widest text-lg placeholder:text-slate-600 focus:border-red-500 transition-all" placeholder="0000">
                </div>

                <div class="pt-4">
                    <button id="submit-btn" onclick="window.submitEvent()" class="w-full bg-red-800 hover:bg-red-900 text-white py-4 rounded-[20px] font-black text-lg shadow-xl shadow-red-900/10 active-scale flex items-center justify-center gap-2">
                        掲示板に書き込む
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- パスワード入力用モーダル (削除用) -->
    <div id="password-modal" class="fixed inset-0 z-[200] modal-bg hidden flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-in zoom-in-95 duration-150">
            <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3 text-slate-600">
                <i data-lucide="lock" class="w-6 h-6"></i>
            </div>
            <h3 class="text-base font-black text-slate-900 mb-2">削除パスワード</h3>
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">投稿時に設定したパスワードを入力してください。</p>
            <input id="delete-password-input" type="password" maxlength="4" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-200 outline-none font-bold text-center tracking-widest text-lg mb-4" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="window.closePasswordModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold text-xs active-scale">キャンセル</button>
                <button id="confirm-delete-btn" class="flex-1 bg-red-800 text-white py-3 rounded-xl font-bold text-xs active-scale">削除する</button>
            </div>
        </div>
    </div>

    <!-- カスタム通知ダイアログ -->
    <div id="alert-modal" class="fixed inset-0 z-[200] modal-bg hidden flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 text-center shadow-2xl animate-in zoom-in-95 duration-150">
            <div id="alert-icon" class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3"></div>
            <h3 id="alert-title" class="text-base font-black text-slate-900 mb-1">通知</h3>
            <p id="alert-text" class="text-xs text-slate-500 mb-5 leading-relaxed">メッセージ内容</p>
            <button onclick="window.closeAlertModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-xs active-scale">確認</button>
        </div>
    </div>

    <!-- ====================================================================== -->
    <!-- ★★★ Firebase クラウド同期ロジック ★★★ -->
    <!-- ====================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebaseの設定情報をそのまま適用
        const myFirebaseConfig = {
            apiKey: "AIzaSyCrGO6B2YZivlR3hZcA8THYMCAaSRY3LCg",
            authDomain: "first-f2567.firebaseapp.com",
            projectId: "first-f2567",
            storageBucket: "first-f2567.firebasestorage.app",
            messagingSenderId: "1078183853799",
            appId: "1:1078183853799:web:e2e9a1264ad361531bec42",
            measurementId: "G-RCZ0DRB1C9"
        };

        // グローバル状態管理
        window.selectedGenre = 'すべて';
        window.searchQuery = '';
        window.currentView = 'list';
        window.currentDisplayMode = 'listMode';
        window.calendarYear = 2026;
        window.calendarMonth = 4;
        window.selectedCalendarDate = '';
        window.events = [];
        window.db = null;
        window.eventsRef = null;
        
        let myPostedIds = [];
        try {
            myPostedIds = JSON.parse(localStorage.getItem('ritsunavi_my_posts') || '[]');
        } catch(e){}

        // Firebaseの初期化
        const initCloudDB = async () => {
            if (Object.keys(myFirebaseConfig).length === 0) {
                window.showCustomAlert("設定エラー", "Firebaseの設定が読み込めません。", "error");
                document.getElementById('loading-spinner').innerHTML = `<p class="text-red-600 font-bold">初期設定が未完了です</p>`;
                return;
            }

            try {
                const app = initializeApp(myFirebaseConfig);
                const auth = getAuth(app);
                window.db = getFirestore(app);
                window.eventsRef = collection(window.db, "bbs_events");

                // 匿名ログインを実行
                await signInAnonymously(auth);

                // リアルタイム接続監視（お友達の投稿も1秒で即時同期！）
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(window.eventsRef, (snapshot) => {
                            let loadedEvents = [];
                            snapshot.forEach(doc => {
                                loadedEvents.push({ id: doc.id, ...doc.data() });
                            });
                            
                            window.events = loadedEvents.sort((a, b) => b.createdAt - a.createdAt);
                            window.renderScreen();
                        }, (error) => {
                            console.error("Firestore Error:", error);
                            window.showCustomAlert("権限エラー", "Firestoreルールを更新してください。", "error");
                        });
                    }
                });
            } catch (error) {
                console.error("Firebase Init Error:", error);
                window.showCustomAlert("接続エラー", "データベース接続に失敗しました。", "error");
            }
        };

        // アラート&モーダル制御
        window.showCustomAlert = (title, text, type = 'success') => {
            const modal = document.getElementById('alert-modal');
            const iconContainer = document.getElementById('alert-icon');
            document.getElementById('alert-title').textContent = title;
            document.getElementById('alert-text').textContent = text;
            if (type === 'error') {
                iconContainer.className = "w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-3 text-red-800";
                iconContainer.innerHTML = `<i data-lucide="shield-alert" class="w-6 h-6"></i>`;
            } else {
                iconContainer.className = "w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3 text-green-800";
                iconContainer.innerHTML = `<i data-lucide="check-circle" class="w-6 h-6"></i>`;
            }
            modal.classList.remove('hidden');
            if (window.lucide) window.lucide.createIcons();
        };

        window.closeAlertModal = () => document.getElementById('alert-modal').classList.add('hidden');
        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.openPasswordModal = (callback) => {
            const modal = document.getElementById('password-modal');
            const input = document.getElementById('delete-password-input');
            input.value = '';
            modal.classList.remove('hidden');
            document.getElementById('confirm-delete-btn').onclick = () => {
                callback(input.value);
            };
        };
        window.closePasswordModal = () => document.getElementById('password-modal').classList.add('hidden');

        window.handleSearch = (val) => { window.searchQuery = val; window.showListView(); };
        window.handleGenreFilter = (genre) => { window.selectedGenre = genre; window.showListView(); };
        window.setDisplayMode = (mode) => { window.currentDisplayMode = mode; window.showListView(); };
        
        window.renderScreen = () => {
            const spinner = document.getElementById('loading-spinner');
            if (spinner) spinner.classList.add('hidden');
            
            if (window.currentView === 'list') window.showListView();
            else if (window.currentView === 'portal') window.showCirclePortal();
            else if (window.currentView === 'detail' && window.currentActiveDetailId) window.showDetailView(window.currentActiveDetailId);
        };

        // 新歓書き込み処理
        window.submitEvent = async () => {
            if (!window.eventsRef) {
                window.showCustomAlert("エラー", "接続が完了していません。", "error");
                return;
            }

            const btn = document.getElementById('submit-btn');
            if (btn.disabled) return;
            
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;
            btn.disabled = true;

            const circle = document.getElementById('f-circle').value.trim();
            const title = document.getElementById('f-title').value.trim();
            const date = document.getElementById('f-date').value;
            const time = document.getElementById('f-time').value.trim();
            const place = document.getElementById('f-place').value.trim();
            const genre = document.getElementById('f-genre').value;
            const price = document.getElementById('f-price').value.trim() || '無料';
            const desc = document.getElementById('f-desc').value.trim() || '詳細は直接お問い合わせください！';
            const password = document.getElementById('f-password').value.trim();

            if (!circle || !title || !date || !time || !place || !password) {
                window.showCustomAlert("確認", "必須項目(*)および削除パスワードを入力してください。", "error");
                btn.innerHTML = `掲示板に書き込む`;
                btn.disabled = false;
                return;
            }

            const newEventData = {
                circleName: circle,
                eventName: title,
                date: date,
                time: time,
                place: place,
                genre: genre,
                price: price,
                description: desc,
                deletePassword: password,
                createdAt: Date.now()
            };

            try {
                const docRef = await addDoc(window.eventsRef, newEventData);
                
                myPostedIds.push(docRef.id);
                localStorage.setItem('ritsunavi_my_posts', JSON.stringify(myPostedIds));
                
                window.closeModal();
                window.showCustomAlert("書き込み完了", "掲示板に公開され、お友達にも同期されました！");
                
                ['f-circle', 'f-title', 'f-time', 'f-place', 'f-desc', 'f-password'].forEach(id => {
                    document.getElementById(id).value = '';
                });
            } catch (error) {
                console.error("Save Error:", error);
                window.showCustomAlert("保存エラー", "書き込みに失敗しました。", "error");
            } finally {
                btn.innerHTML = `掲示板に書き込む`;
                btn.disabled = false;
            }
        };

        // セキュリティ対応・投稿削除要求
        window.requestDelete = (id) => {
            const ev = window.events.find(e => e.id === id);
            if (!ev) return;

            // 1. もし自分のスマホからの投稿履歴なら、パスワード不要で即削除
            if (myPostedIds.includes(id)) {
                if(confirm("あなたが投稿したイベントです。完全に削除しますか？")) {
                    executeDelete(id);
                }
                return;
            }

            // 2. 他人の投稿の場合は、パスワード入力モーダルを立ち上げる！
            window.openPasswordModal((inputPwd) => {
                if (inputPwd === ev.deletePassword) {
                    window.closePasswordModal();
                    executeDelete(id);
                } else {
                    window.showCustomAlert("制限エラー", "削除パスワードが正しくありません。他人の投稿は勝手に消せません。", "error");
                }
            });
        };

        const executeDelete = async (id) => {
            try {
                await deleteDoc(doc(window.db, "bbs_events", id));
                
                myPostedIds = myPostedIds.filter(pid => pid !== id);
                localStorage.setItem('ritsunavi_my_posts', JSON.stringify(myPostedIds));
                
                window.showListView();
                window.showCustomAlert("削除完了", "掲示板から完全に削除しました。");
            } catch (error) {
                console.error("Delete Error:", error);
                window.showCustomAlert("エラー", "削除に失敗しました。", "error");
            }
        };

        // 「自分の投稿」ダッシュボード画面
        window.showCirclePortal = () => {
            window.currentView = 'portal';
            const main = document.getElementById('main-content');
            if (!main) return;

            let myEventsHtml = '';
            window.events.forEach(ev => {
                if (myPostedIds.includes(ev.id)) {
                    myEventsHtml += `
                        <div class="p-4 border border-slate-100 rounded-2xl bg-white flex justify-between items-center shadow-sm mb-3">
                            <div class="overflow-hidden pr-2">
                                <p class="text-xs font-black text-slate-700 truncate">${ev.circleName}</p>
                                <p class="text-[10px] text-slate-400 font-bold mt-0.5 truncate">${ev.eventName} (${ev.date})</p>
                            </div>
                            <div class="flex gap-2 flex-shrink-0">
                                <button onclick="window.showDetailView('${ev.id}')" class="p-2 bg-slate-50 border border-slate-100 rounded-lg text-slate-600 active-scale"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button onclick="window.requestDelete('${ev.id}')" class="p-2 bg-red-50 border border-red-100 rounded-lg text-red-600 active-scale"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                }
            });

            main.innerHTML = `
                <div class="p-6 space-y-6 animate-in fade-in duration-200">
                    <div class="bg-slate-800 p-6 rounded-3xl text-white shadow-lg">
                        <div class="flex justify-between items-start mb-2">
                            <i data-lucide="history" class="w-6 h-6 text-slate-400"></i>
                            <span class="bg-blue-500/20 text-blue-400 text-[9px] font-bold px-2.5 py-1 rounded-full flex items-center gap-1.5 border border-blue-500/30">
                                <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse"></span> オンライン同期中
                            </span>
                        </div>
                        <h2 class="text-lg font-black">この端末の投稿履歴</h2>
                        <p class="text-[11px] mt-2 text-slate-300 leading-relaxed">あなたがこの端末から追加した新歓一覧です。ここからは暗証番号なしで一発削除できます。</p>
                    </div>
                    <div>
                        ${myEventsHtml === '' ? `
                            <div class="py-12 text-center border-2 border-dashed border-slate-200 rounded-3xl text-slate-400">
                                <p class="text-xs font-bold">まだこの端末からの投稿はありません</p>
                            </div>
                        ` : myEventsHtml}
                    </div>
                </div>
            `;
            if (window.lucide) window.lucide.createIcons();
        };

        // リスト画面の描画処理（カレンダー切り替え付き）
        window.showListView = () => {
            window.currentView = 'list';
            window.currentActiveDetailId = null;
            const main = document.getElementById('main-content');
            if (!main) return;
            
            let html = `
                <div class="p-5 bg-white border-b border-slate-100 space-y-4 sticky top-0 z-10 shadow-sm">
                    <div class="flex bg-slate-100 p-1 rounded-2xl">
                        <button onclick="window.setDisplayMode('listMode')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition-all flex items-center justify-center gap-1.5 ${window.currentDisplayMode === 'listMode' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}"><i data-lucide="list-ordered" class="w-4 h-4"></i> リスト順</button>
                        <button onclick="window.setDisplayMode('calendarMode')" class="flex-1 py-2.5 rounded-xl text-xs font-black transition-all flex items-center justify-center gap-1.5 ${window.currentDisplayMode === 'calendarMode' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}"><i data-lucide="calendar-days" class="w-4 h-4"></i> カレンダー一覧</button>
                    </div>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3.5 top-3.5 text-slate-400 w-4.5 h-4.5"></i>
                        <input type="text" placeholder="サークル名で検索" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-3 pl-10 pr-4 text-sm font-medium outline-none focus:bg-white focus:border-red-800/30 transition-all" value="${window.searchQuery}" oninput="window.handleSearch(this.value)">
                    </div>
                    <div class="flex gap-2.5 overflow-x-auto no-scrollbar py-0.5">
            `;

            ['すべて', 'スポーツ', '文化', '音楽', 'ボランティア'].forEach(g => {
                const isActive = window.selectedGenre === g;
                html += `<button onclick="window.handleGenreFilter('${g}')" class="px-4.5 py-2 rounded-full text-xs font-black whitespace-nowrap border transition-all active-scale ${isActive ? 'bg-red-800 border-red-800 text-white shadow-md' : 'bg-white border-slate-200 text-slate-400'}">${g}</button>`;
            });

            html += `</div></div>`;

            const filtered = window.events.filter(ev => {
                const matchGenre = (window.selectedGenre === 'すべて' || ev.genre === window.selectedGenre);
                const matchSearch = ev.circleName.includes(window.searchQuery) || ev.eventName.includes(window.searchQuery);
                return matchGenre && matchSearch;
            }).sort((a, b) => new Date(a.date) - new Date(b.date));

            if (window.currentDisplayMode === 'listMode') {
                html += `<div class="p-5 space-y-5 pb-24">`;
                if (filtered.length === 0) {
                    html += `<div class="py-16 text-center text-slate-300"><i data-lucide="database" class="w-14 h-14 mx-auto mb-3 opacity-30"></i><p class="font-bold text-sm">現在公開されている新歓イベントはありません</p></div>`;
                } else {
                    filtered.forEach(ev => { html += renderEventCard(ev); });
                }
                html += `</div>`;
            } else {
                html += renderCalendarView(filtered);
            }

            main.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        };

        const renderEventCard = (ev) => `
            <div class="bg-white rounded-[28px] border border-slate-100 shadow-sm overflow-hidden active-scale transition-all" onclick="window.showDetailView('${ev.id}')">
                <div class="p-5 relative">
                    <span class="absolute top-5 right-5 bg-red-50 px-3 py-1 rounded-full text-[10px] font-black text-red-800">${ev.genre}</span>
                    <p class="text-[10px] font-black text-slate-400 mb-1.5"><i data-lucide="users" class="w-3 h-3 inline pb-0.5"></i> ${ev.circleName}</p>
                    <h3 class="text-base font-black text-slate-800 leading-snug mb-3">${ev.eventName}</h3>
                    <div class="flex items-center gap-3 text-[11px] font-bold text-slate-500">
                        <span class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-md"><i data-lucide="calendar" class="w-3.5 h-3.5 text-red-800"></i> ${ev.date.substring(5).replace('-', '/')}</span>
                        <span class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-md truncate max-w-[120px]"><i data-lucide="map-pin" class="w-3.5 h-3.5 text-red-800"></i> ${ev.place}</span>
                    </div>
                </div>
            </div>
        `;

        window.changeMonth = (delta) => {
            window.calendarMonth += delta;
            if (window.calendarMonth > 12) { window.calendarMonth = 1; window.calendarYear++; }
            if (window.calendarMonth < 1) { window.calendarMonth = 12; window.calendarYear--; }
            window.selectedCalendarDate = '';
            window.showListView();
        };
        
        window.selectCalendarDate = (date) => {
            window.selectedCalendarDate = window.selectedCalendarDate === date ? '' : date;
            window.showListView();
        };

        const renderCalendarView = (filteredEvents) => {
            const eventDates = {};
            filteredEvents.forEach(ev => {
                eventDates[ev.date] = eventDates[ev.date] || [];
                eventDates[ev.date].push(ev);
            });

            const firstDayIndex = new Date(window.calendarYear, window.calendarMonth - 1, 1).getDay();
            const totalDays = new Date(window.calendarYear, window.calendarMonth, 0).getDate();

            let calendarGridHtml = '';
            for (let i = 0; i < firstDayIndex; i++) calendarGridHtml += `<div class="aspect-square"></div>`;

            for (let day = 1; day <= totalDays; day++) {
                const fullDateStr = `${window.calendarYear}-${String(window.calendarMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasEvents = eventDates[fullDateStr] && eventDates[fullDateStr].length > 0;
                const isSelected = window.selectedCalendarDate === fullDateStr;

                calendarGridHtml += `
                    <button onclick="window.selectCalendarDate('${fullDateStr}')" class="aspect-square flex flex-col items-center justify-center rounded-2xl relative transition-all active-scale ${isSelected ? 'bg-red-800 text-white font-black shadow-md' : 'hover:bg-slate-50 text-slate-800'}">
                        <span class="text-xs font-bold">${day}</span>
                        ${hasEvents ? `<span class="absolute bottom-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-red-800'}"></span>` : ''}
                    </button>
                `;
            }

            let targetDayEventsHtml = '';
            if (window.selectedCalendarDate) {
                const dayEvents = eventDates[window.selectedCalendarDate] || [];
                targetDayEventsHtml += `<div class="p-5 border-t border-slate-100 bg-slate-50/50 space-y-4">`;
                if (dayEvents.length === 0) {
                    targetDayEventsHtml += `<p class="text-xs text-slate-400 font-bold py-6 text-center">この日は新歓イベントがありません</p>`;
                } else {
                    dayEvents.forEach(ev => { targetDayEventsHtml += renderEventCard(ev); });
                }
                targetDayEventsHtml += `</div>`;
            } else {
                targetDayEventsHtml += `
                    <div class="p-5 border-t border-slate-100 space-y-3">
                        <p class="text-[10px] text-slate-400 font-black tracking-wider uppercase">日付をタップすると、その日に開催されるサークルのイベントだけが表示されます！</p>
                    </div>
                `;
            }

            return `
                <div class="flex-1 bg-white flex flex-col pb-24">
                    <div class="px-6 py-4 flex justify-between items-center bg-slate-50/60 border-b border-slate-100">
                        <button onclick="window.changeMonth(-1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-600 active-scale"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <span class="text-sm font-black text-slate-800 tracking-wide">${window.calendarYear}年 ${window.calendarMonth}月</span>
                        <button onclick="window.changeMonth(1)" class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-600 active-scale"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 px-5 pt-3 text-center text-[10px] font-black tracking-widest text-slate-400">
                        <div class="text-red-700">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-700">土</div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 p-4">${calendarGridHtml}</div>
                    <div class="flex-1">${targetDayEventsHtml}</div>
                </div>
            `;
        };

        // 詳細画面の描画処理（自分が作成したもの以外のゴミ箱ボタンにセーフティロック追加）
        window.showDetailView = (id) => {
            window.currentView = 'detail';
            window.currentActiveDetailId = id;
            const ev = window.events.find(e => e.id === id);
            const main = document.getElementById('main-content');
            if (!main || !ev) return;

            const isMyPost = myPostedIds.includes(id);

            main.innerHTML = `
                <div class="bg-slate-50 flex-1 animate-in slide-in-from-right duration-200 relative pb-20">
                    <header class="bg-white p-4 border-b border-slate-200 flex justify-between items-center sticky top-0 z-10">
                        <button onclick="window.showListView()" class="w-10 h-10 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center active-scale"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <span class="text-xs font-black text-slate-500 uppercase">新歓イベント詳細</span>
                        
                        <!-- 自分がこの端末で投稿した以外のイベントでは、ゴミ箱ボタンを非表示に！ -->
                        ${isMyPost ? `
                            <button onclick="window.requestDelete('${ev.id}')" class="w-10 h-10 bg-red-50 text-red-600 rounded-full flex items-center justify-center active-scale"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        ` : `
                            <!-- 他人の投稿でも、パスワードを知っている管理者のみが消せるように暗証番号ボタンとして表示します -->
                            <button onclick="window.requestDelete('${ev.id}')" class="w-10 h-10 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center active-scale"><i data-lucide="lock" class="w-4 h-4"></i></button>
                        `}
                    </header>

                    <div class="p-6 space-y-6">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <span class="bg-red-50 text-red-800 text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-widest mb-3 inline-block">${ev.genre}</span>
                            <h2 class="text-xl font-black text-slate-800 leading-snug mb-2">${ev.eventName}</h2>
                            <p class="text-red-800 font-bold text-xs mb-6 flex items-center gap-1.5"><i data-lucide="users" class="w-4 h-4"></i><span>${ev.circleName}</span></p>

                            <div class="grid grid-cols-2 gap-3.5 mb-6 border-y border-slate-100 py-4">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">日時</p>
                                    <p class="text-xs font-bold text-slate-800">${ev.date}<br>${ev.time}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">場所・会費</p>
                                    <p class="text-xs font-bold text-slate-800">${ev.place}<br>参加費: ${ev.price}</p>
                                </div>
                            </div>

                            <div>
                                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">イベント詳細・新入生へのメッセージ</h3>
                                <p class="text-xs font-medium text-slate-600 leading-relaxed whitespace-pre-wrap">${ev.description}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            if (window.lucide) window.lucide.createIcons();
        };

        // 起動
        initCloudDB();
    </script>
</body>
</html>
